<main class="container-fluid d-flex flex-column h-100 lg-overflo">
    <header class="d-flex align-items-center justify-content-between px-2 py-2">
        <h1 id="title">App Meteo</h1>
        <div class="input-group w-25" id="searchCity">
            <input type="text" class="form-control" placeholder="Entrez une ville" aria-label="City name" id="cityInput">
            <i class="bi bi-search input-group-text"></i>
        </div>
        <ul class="m-0 p-0" id="socialLink">
            <li>
                <a href="#"><i class="bi bi-github fs-4"></i></a>
            </li>
        </ul>
    </header>

    <div class="row flex-grow-1 align-items-stretch g-2 pb-2">

        <!-- Colonne gauche -->
        <div class="col-lg-4 d-flex flex-column">
            <div class="card flex-grow-1">
                <div class="card-header">
                    <h5 class="mb-0">Prévisions sur 14 jours</h5>
                </div>
                <div class="card-body overflow-auto">
                    <table class="table mb-0 h-100">
                        <tbody id="dailyForecast"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Colonne centrale -->
        <div class="col-lg-4 d-flex flex-column gap-2">
            <div class="row g-2 mb-2">
                <div class="col-6">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column justify-content-center align-items-center">
                            <h1 class="mb-0 fs-2" id="cityName"></h1>
                            <h3 class="fw-normal fs-4 mb-0" id="countryName"></h3>
                            <div class="row fs-1" id="temp"></div>
                            <div class="row gap-2">
                                <div class="w-fit-content p-0" id="tempMax"></div>
                                <div class="w-fit-content p-0" id="tempMin"></div>
                            </div>
                            <div class="row" id="precip"></div>
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card h-100">
                        <div class="card-header">
                            <h5 class="mb-0">Vent</h5>
                        </div>
                        <div class="px-3" id="compass-container"></div>
                    </div>
                </div>
            </div>

            <div class="card min-h-fit-content" style="height: fit-content !important;">
                <div class="card-header">
                    <h5 class="mb-0">Prévisions heure par heure</h5>
                </div>
                <div class="card-body overflow-x-auto overflow-y-hidden">
                    <div class="row flex-nowrap h-100" id="hourlyForecast"></div>
                </div>
            </div>

            <div class="card flex-grow-1">
                <div class="card-header">
                    <h5 class="mb-0">(SOON)</h5>
                </div>
                <div class="card-body"></div>
            </div>
        </div>

        <!-- Colonne carte -->
        <div class="col-lg-4 d-flex flex-column">
            <div class="card flex-grow-1" id="cardMap">
                <div class="card-body p-0">
                    <div id="map" style="width: 100%; height: 100%;"></div>
                </div>
            </div>
        </div>

    </div>
</main>
